_format_version: "3.0"

# ── Consumers ────────────────────────────────────────────────────────────────
# SMOKE_API_KEY is injected from the environment at Kong startup.
# Set it in .env (never commit the value — .env is gitignored).

consumers:
  - username: smoke-test-consumer

keyauth_credentials:
  - consumer: smoke-test-consumer
    key: $(SMOKE_API_KEY)

# ── Services & Routes ─────────────────────────────────────────────────────────

services:
  - name: litellm
    url: http://litellm:4000
    connect_timeout: 10000
    read_timeout:    60000
    write_timeout:   60000

    routes:
      # Model catalogue — read-only metadata, Kong → LiteLLM direct (no guardrails)
      - name: models-catalogue
        paths:
          - /v1/models
        methods:
          - GET
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - Authorization
              key_in_header: true
              hide_credentials: true

      # All other /v1 traffic (inference) — auth enforced here; guardrails added in Phase 03
      - name: litellm-proxy
        paths:
          - /v1
        methods:
          - GET
          - POST
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - Authorization
              key_in_header: true
              hide_credentials: true

# ── Global Plugins ────────────────────────────────────────────────────────────

plugins:
  - name: correlation-id
    config:
      header_name:      X-Request-ID
      generator:        uuid
      echo_downstream:  true

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Platform: inference-platform"
          - "X-API-Version: 1"
