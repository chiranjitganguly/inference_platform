_format_version: "3.0"

# ── Consumers ────────────────────────────────────────────────────────────────
# SMOKE_API_KEY is injected from the environment at Kong startup.
# Set it in .env (never commit the value — .env is gitignored).

consumers:
  - username: smoke-test-consumer

keyauth_credentials:
  - consumer: smoke-test-consumer
    key: $(SMOKE_API_KEY)

# ── Services & Routes ─────────────────────────────────────────────────────────

services:
  - name: litellm
    url: http://litellm:4000
    connect_timeout: 10000
    read_timeout:    60000
    write_timeout:   60000

    routes:
      # Health check — unauthenticated; required by load balancers and Docker HEALTHCHECK
      - name: litellm-health
        paths:
          - /health
        methods:
          - GET
        strip_path: false

      # Model catalogue — read-only metadata, Kong → LiteLLM direct (no guardrails)
      - name: models-catalogue
        paths:
          - /v1/models
        methods:
          - GET
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - Authorization
              key_in_header: true
              hide_credentials: true

      # All other /v1 traffic (inference) — auth enforced here; guardrails added in Phase 03
      - name: litellm-proxy
        paths:
          - /v1
        methods:
          - GET
          - POST
        strip_path: false
        plugins:
          - name: key-auth
            config:
              key_names:
                - Authorization
              key_in_header: true
              hide_credentials: true

  # ── portal-backend — spend report (master key validated via LiteLLM proxy) ──
  - name: portal-backend
    url: http://portal-backend:8092
    connect_timeout: 10000
    read_timeout:    15000
    write_timeout:   15000

    routes:
      - name: spend-report
        paths:
          - /v1/spend
        methods:
          - GET
        strip_path: false

  # ── LiteLLM admin — key management (master key enforced by LiteLLM itself) ──
  - name: litellm-admin
    url: http://litellm:4000
    connect_timeout: 10000
    read_timeout:    30000
    write_timeout:   30000

    routes:
      - name: litellm-key-manage
        paths:
          - /v1/key
        methods:
          - GET
          - POST
          - DELETE
        strip_path: true

# ── Global Plugins ────────────────────────────────────────────────────────────

plugins:
  - name: correlation-id
    config:
      header_name:      X-Request-ID
      generator:        uuid
      echo_downstream:  true

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Platform: inference-platform"
          - "X-API-Version: 1"
