      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      provider: anthropic
      tier: premium
      type: chat
      status: available
      context_window: 200000
      capabilities:
        - chat
        - streaming
        - function-calling
        - vision

  - model_name: claude-haiku
