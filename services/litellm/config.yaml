  # ── Google ───────────────────────────────────────────────────────────────────
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.0-pro-exp
      api_key: os.environ/GOOGLE_API_KEY
    model_info:
      provider: google
      tier: premium
      type: chat
      status: available
      context_window: 1048576
      capabilities:
        - chat
        - streaming
        - function-calling
        - vision

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
