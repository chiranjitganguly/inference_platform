model_list:
  # ── OpenAI ──────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      provider: openai
      tier: premium
      type: chat
      status: available
      context_window: 128000
      capabilities:
        - chat
        - streaming
        - function-calling
        - vision

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      provider: openai
      tier: standard
      type: chat
      status: available
      context_window: 128000
      capabilities:
        - chat
        - streaming
        - function-calling

  - model_name: gpt-4.1
