  # ── OpenAI Embeddings ────────────────────────────────────────────────────────
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      provider: openai
      tier: standard
      type: embedding
      status: available
      context_window: 8191
      capabilities:
        - embeddings
      dimensions: 1536

  - model_name: text-embedding-3-large
