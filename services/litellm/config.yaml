litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # callbacks: [arize_phoenix, langfuse, prometheus, fallback_callbacks.FallbackSpanCallback]
  # Disabled for core-profile local dev: arize_phoenix/langfuse are unknown to
  # LiteLLM v1.52.0 (added in later releases); prometheus requires Enterprise license.
  # Re-enable when running with the obs profile and a valid LITELLM_LICENSE.

  # Cache non-streaming completions and embeddings only (FR-013).
  # Streaming responses must never be read from or written to the cache.
  # Omitting streaming call types here enforces this regardless of LiteLLM patch version.
  cache: true
  cache_params:
    type: redis
    host: redis-cache
    port: 6379
    namespace: llm_cache
    ttl: os.environ/LITELLM_CACHE_TTL
    supported_call_types:
      - acompletion
      - completion
      - aembedding
      - embedding

  fallbacks:
    - gpt-4o:        [claude-sonnet, gemini-pro]
    - gpt-4o-mini:   [claude-haiku, gemini-flash]
    - gpt-4.1:       [claude-sonnet, gemini-pro]
    - o4-mini:       [claude-haiku, gemini-flash]
    - claude-sonnet: [gpt-4o, gemini-pro]
    - claude-haiku:  [gpt-4o-mini, gemini-flash]
    - gemini-pro:    [gpt-4o, claude-sonnet]
    - gemini-flash:  [gpt-4o-mini, claude-haiku]
    - command-r-plus: [gpt-4o, claude-sonnet]

  context_window_fallbacks:
    - gpt-4o:        [gpt-4.1]
    - gpt-4o-mini:   [gpt-4.1]
    - o4-mini:       [gpt-4.1]
    - claude-sonnet: [gemini-pro]
    - claude-haiku:  [gemini-pro]
    - command-r-plus: [gpt-4.1]

  num_retries: 2
  allowed_fails: 3
  cooldown_time: 60

general_settings:
  database_url: os.environ/DATABASE_URL
