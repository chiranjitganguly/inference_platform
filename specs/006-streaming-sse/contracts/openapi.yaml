openapi: "3.1.0"

info:
  title: Inference Platform — Streaming Chat Completions
  version: "1"
  description: >
    Extension of the feature-005 chat completions contract to cover stream: true.
    POST /v1/chat/completions — when stream: true, returns text/event-stream (SSE).
    When stream: false or omitted, behaviour is identical to feature-005.

servers:
  - url: http://localhost:8080
    description: Local dev (Kong proxy)

paths:
  /v1/chat/completions:
    post:
      summary: Submit a chat completion request (streaming or non-streaming)
      operationId: createChatCompletion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              streaming:
                summary: Streaming request
                value:
                  model: gpt-4o-mini
                  messages:
                    - role: user
                      content: "Explain quantum entanglement in simple terms."
                  stream: true
              streaming_with_metadata:
                summary: Streaming with traceability metadata
                value:
                  model: claude-haiku
                  messages:
                    - role: user
                      content: "What is the Turing test?"
                  stream: true
                  metadata:
                    team: research
                    request_id: "req-stream-001"
                    prompt_name: "system-v1"
              non_streaming:
                summary: Non-streaming (unchanged from feature 005)
                value:
                  model: gpt-4o-mini
                  messages:
                    - role: user
                      content: "What is 2+2?"
      responses:
        "200":
          description: >
            Successful response. Content-Type determines streaming vs non-streaming:
            - text/event-stream: streaming SSE response (stream: true)
            - application/json: complete response (stream: false or omitted)
          headers:
            X-Request-ID:
              description: Correlation ID (UUID) generated by Kong
              schema:
                type: string
                format: uuid
            X-Platform:
              schema:
                type: string
                example: inference-platform
            X-API-Version:
              schema:
                type: string
                example: "1"
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/StreamResponse"
              example: |
                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","model":"gpt-4o-mini","choices":[{"index":0,"delta":{"role":"assistant","content":""},"finish_reason":null}]}

                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","model":"gpt-4o-mini","choices":[{"index":0,"delta":{"content":"Quantum"},"finish_reason":null}]}

                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","model":"gpt-4o-mini","choices":[{"index":0,"delta":{"content":" entanglement"},"finish_reason":null}]}

                data: {"id":"chatcmpl-abc","object":"chat.completion.chunk","model":"gpt-4o-mini","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}

                data: [DONE]

            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              example:
                id: "chatcmpl-xyz"
                object: "chat.completion"
                model: "gpt-4o-mini"
                choices:
                  - index: 0
                    message:
                      role: assistant
                      content: "4"
                    finish_reason: stop
                usage:
                  prompt_tokens: 14
                  completion_tokens: 1
                  total_tokens: 15
        "400":
          description: Invalid request (applies to both streaming and non-streaming)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unknown_model:
                  value:
                    error:
                      message: "Model 'nonexistent-model-xyz' is not available on this platform."
                      type: invalid_request_error
                      code: 400
                empty_messages:
                  value:
                    error:
                      message: "messages must contain at least one entry."
                      type: invalid_request_error
                      code: 400
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Platform model name; must be a chat model (not embedding)
          example: gpt-4o-mini
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Message"
        stream:
          type: boolean
          default: false
          description: >
            true = SSE streaming response (text/event-stream);
            false or omitted = complete JSON response (application/json).
            Streaming requests bypass the response cache.
        metadata:
          $ref: "#/components/schemas/RequestMetadata"

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
          minLength: 1

    RequestMetadata:
      type: object
      properties:
        team:
          type: string
        request_id:
          type: string
        prompt_name:
          type: string

    StreamResponse:
      type: string
      description: >
        Server-Sent Events stream. Each line is either:
        - "data: <StreamChunkJSON>" where StreamChunkJSON is independently parseable JSON, or
        - "data: [DONE]" as the final sentinel line.
        Empty lines separate events. The stream closes after [DONE].

    StreamChunk:
      type: object
      required: [id, object, model, choices]
      properties:
        id:
          type: string
          description: Shared across all chunks in one response
        object:
          type: string
          enum: [chat.completion.chunk]
        model:
          type: string
        choices:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/StreamChoice"

    StreamChoice:
      type: object
      required: [index, delta, finish_reason]
      properties:
        index:
          type: integer
          enum: [0]
        delta:
          $ref: "#/components/schemas/Delta"
        finish_reason:
          type: [string, "null"]
          enum: [stop, length, content_filter, null]
          description: null for all chunks except the final content chunk

    Delta:
      type: object
      description: Content carrier. Independently parseable — no cross-chunk dependency.
      properties:
        role:
          type: string
          enum: [assistant]
          description: Present only in the first chunk
        content:
          type: string
          description: Token delta. May be empty string on first chunk.

    StreamErrorEvent:
      type: object
      description: >
        Emitted as a final SSE event when the upstream errors after HTTP 200 headers
        are sent. After this event the connection closes; [DONE] is NOT sent.
      required: [error]
      properties:
        error:
          type: object
          required: [message, type, code]
          properties:
            message:
              type: string
            type:
              type: string
              example: upstream_error
            code:
              type: integer

    ChatResponse:
      type: object
      description: Non-streaming response (stream:false or omitted) — unchanged from feature 005
      required: [id, object, model, choices, usage]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        model:
          type: string
        choices:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/Choice"
        usage:
          $ref: "#/components/schemas/Usage"

    Choice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
          enum: [0]
        message:
          type: object
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
              minLength: 1
        finish_reason:
          type: string
          enum: [stop, length, content_filter]

    Usage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 1
        completion_tokens:
          type: integer
          minimum: 1
        total_tokens:
          type: integer
          minimum: 2

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type, code]
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: integer
