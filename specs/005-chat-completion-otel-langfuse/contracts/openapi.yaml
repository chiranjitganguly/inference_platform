openapi: "3.1.0"

info:
  title: Inference Platform — Chat Completions
  version: "1"
  description: >
    POST /v1/chat/completions — OpenAI-compatible non-streaming chat endpoint.
    Routed via Kong (key-auth required). Observability emitted automatically
    to Phoenix Arize and Langfuse via LiteLLM callbacks.

servers:
  - url: http://localhost:8080
    description: Local dev (Kong proxy)

paths:
  /v1/chat/completions:
    post:
      summary: Submit a chat completion request
      operationId: createChatCompletion
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              minimal:
                summary: Single user message
                value:
                  model: gpt-4o-mini
                  messages:
                    - role: user
                      content: "What is the capital of France?"
              with_metadata:
                summary: Request with traceability metadata
                value:
                  model: claude-haiku
                  messages:
                    - role: system
                      content: "You are a helpful assistant."
                    - role: user
                      content: "Summarise the key points of the Kyoto Protocol."
                  metadata:
                    team: data-science
                    request_id: "req-abc-123"
                    prompt_name: "system-v1"
      responses:
        "200":
          description: Successful chat completion (non-streaming)
          headers:
            X-Request-ID:
              description: Correlation ID (UUID) generated by Kong
              schema:
                type: string
                format: uuid
            X-Platform:
              description: Platform identifier
              schema:
                type: string
                example: inference-platform
            X-API-Version:
              description: API version
              schema:
                type: string
                example: "1"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              example:
                id: "chatcmpl-abc123"
                object: "chat.completion"
                model: "gpt-4o-mini"
                choices:
                  - index: 0
                    message:
                      role: assistant
                      content: "Paris is the capital of France."
                    finish_reason: stop
                usage:
                  prompt_tokens: 14
                  completion_tokens: 9
                  total_tokens: 23
        "400":
          description: Invalid request — unknown model or empty messages array
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unknown_model:
                  summary: Model not in catalogue
                  value:
                    error:
                      message: "Model 'nonexistent-model-xyz' is not available on this platform."
                      type: invalid_request_error
                      code: 400
                empty_messages:
                  summary: Empty messages array
                  value:
                    error:
                      message: "messages must contain at least one entry."
                      type: invalid_request_error
                      code: 400
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  message: "No API key provided."
                  type: authentication_error
                  code: 401
        "503":
          description: Model exists in catalogue but is currently unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  message: "Model 'command-r-plus' is currently unavailable. Try again later."
                  type: service_unavailable
                  code: 503

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Platform API key — set via Kong key-auth (Authorization: Bearer <key>)

  schemas:
    ChatRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          description: Platform model name (must be in model catalogue)
          example: gpt-4o-mini
        messages:
          type: array
          minItems: 1
          description: Conversation history; at least one message required
          items:
            $ref: "#/components/schemas/Message"
        stream:
          type: boolean
          default: false
          description: Streaming is out of scope; must be false or omitted
        metadata:
          $ref: "#/components/schemas/RequestMetadata"

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
          minLength: 1

    RequestMetadata:
      type: object
      description: Optional traceability tags forwarded to Phoenix and Langfuse
      properties:
        team:
          type: string
          description: Team name — appears as tag on Phoenix span and Langfuse trace
          example: data-science
        request_id:
          type: string
          description: Caller-supplied request identifier for traceability
          example: req-abc-123
        prompt_name:
          type: string
          description: >
            Named prompt in Langfuse. When present, the Langfuse trace is linked
            to the current production version of this prompt.
          example: system-v1

    ChatResponse:
      type: object
      required: [id, object, model, choices, usage]
      properties:
        id:
          type: string
          description: LiteLLM-generated completion identifier
        object:
          type: string
          enum: [chat.completion]
        model:
          type: string
          description: Echoes the requested model name
        choices:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/Choice"
        usage:
          $ref: "#/components/schemas/Usage"

    Choice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
          enum: [0]
        message:
          $ref: "#/components/schemas/AssistantMessage"
        finish_reason:
          type: string
          enum: [stop, length, content_filter]

    AssistantMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [assistant]
        content:
          type: string
          description: Generated text — non-empty on finish_reason stop or length
          minLength: 1

    Usage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 1
        completion_tokens:
          type: integer
          minimum: 1
        total_tokens:
          type: integer
          minimum: 2

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type, code]
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: integer
