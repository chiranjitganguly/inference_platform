services:

  postgres:
    image: postgres:16-alpine
    profiles: [core]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.52.0
    profiles: [core]
    environment:
      LITELLM_MASTER_KEY:             ${LITELLM_MASTER_KEY}
      OPENAI_API_KEY:                  ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY:               ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY:                  ${GOOGLE_API_KEY}
      COHERE_API_KEY:                  ${COHERE_API_KEY}
      LANGFUSE_PUBLIC_KEY:             ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY:             ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST:                   ${LANGFUSE_HOST}
      OTEL_EXPORTER_OTLP_ENDPOINT:     ${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    # Port 4000 has no host binding — all traffic via Kong :8080 (constitution §2.1)
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kong:
    image: kong:3.6
    profiles: [core]
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/declarative/kong.yml
      KONG_PROXY_LISTEN:       "0.0.0.0:8080"
      KONG_ADMIN_LISTEN:       "127.0.0.1:8001"
      KONG_LOG_LEVEL:          notice
      SMOKE_API_KEY:           ${SMOKE_API_KEY}
    volumes:
      - ./services/kong/kong.yml:/etc/kong/declarative/kong.yml:ro
    ports:
      - "8080:8080"   # Kong proxy — the only public port (constitution §2.1)
      - "8001:8001"   # Kong admin — localhost only
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  redis-cache:
    image: redis:7.2-alpine
    profiles: [core]
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  redis-queue:
    image: redis:7.2-alpine
    profiles: [core]
    command: >
      redis-server
      --port 6380
      --maxmemory-policy noeviction
      --save ""
      --appendonly no
    expose:
      - "6380"
    ports:
      - "6380:6380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  arize-phoenix:
    image: arizephoenix/phoenix:latest
    profiles: [obs]
    environment:
      PHOENIX_SQL_DATABASE_URL: ${PHOENIX_SQL_DATABASE_URL}
    expose:
      - "6006"
    ports:
      - "6006:6006"   # Phoenix UI + OTLP HTTP — dev inspection only
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6006 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  langfuse-server:
    image: langfuse/langfuse:3
    profiles: [obs]
    environment:
      DATABASE_URL:                ${LANGFUSE_DATABASE_URL}
      NEXTAUTH_URL:                ${NEXTAUTH_URL}
      NEXTAUTH_SECRET:             ${NEXTAUTH_SECRET}
      SALT:                        ${SALT}
      LANGFUSE_INIT_USER_EMAIL:    ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    expose:
      - "3002"
    ports:
      - "3002:3000"   # Langfuse server UI — dev inspection only
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: [obs]
    environment:
      DATABASE_URL:     ${LANGFUSE_DATABASE_URL}
      NEXTAUTH_SECRET:  ${NEXTAUTH_SECRET}
      SALT:             ${SALT}
    depends_on:
      langfuse-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  phoenix_data:
  langfuse_data:

# ── Startup ordering for future services ────────────────────────────────────
#
# Every service that connects to postgres MUST wait for the healthcheck to
# pass before starting. Add this block to each dependent service:
#
#   depends_on:
#     postgres:
#       condition: service_healthy
#
# This ensures init-db.sql has finished running before any application
# service attempts a connection.
