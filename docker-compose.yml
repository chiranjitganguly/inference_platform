services:

  postgres:
    image: postgres:16-alpine
    profiles: [core]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.52.0
    profiles: [core]
    environment:
      LITELLM_MASTER_KEY:             ${LITELLM_MASTER_KEY}
      OPENAI_API_KEY:                  ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY:               ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY:                  ${GOOGLE_API_KEY}
      COHERE_API_KEY:                  ${COHERE_API_KEY}
      LANGFUSE_PUBLIC_KEY:             ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY:             ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST:                   ${LANGFUSE_HOST}
      OTEL_EXPORTER_OTLP_ENDPOINT:     ${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    # Port 4000 has no host binding — all traffic via Kong :8080 (constitution §2.1)
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kong:
    image: kong:3.6
    profiles: [core]
    environment:
      KONG_DATABASE:           "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/declarative/kong.yml
      KONG_PROXY_LISTEN:       "0.0.0.0:8080"
      KONG_ADMIN_LISTEN:       "127.0.0.1:8001"
      KONG_LOG_LEVEL:          notice
      SMOKE_API_KEY:           ${SMOKE_API_KEY}
    volumes:
      - ./services/kong/kong.yml:/etc/kong/declarative/kong.yml:ro
    ports:
      - "8080:8080"   # Kong proxy — the only public port (constitution §2.1)
      - "8001:8001"   # Kong admin — localhost only
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  pg_data:

# ── Startup ordering for future services ────────────────────────────────────
#
# Every service that connects to postgres MUST wait for the healthcheck to
# pass before starting. Add this block to each dependent service:
#
#   depends_on:
#     postgres:
#       condition: service_healthy
#
# This ensures init-db.sql has finished running before any application
# service attempts a connection.
